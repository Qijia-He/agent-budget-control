### model
model_name_or_path: Qwen/Qwen3.5-4B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: /path/to/LLaMA-Factory/examples/deepspeed/ds_z2_config.json

### dataset
dataset_dir: /path/to/LLaMA-Factory/data
dataset: gemini_25_flash_pro_3cls
template: qwen3_nothink
cutoff_len: 4096
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /path/to/agent-budget-control/sft_runs/outputs/gemini_25_flash_pro_3cls_qwen35_4b_full
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: gemini_25_flash_pro_3cls_qwen35_4b_full

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
